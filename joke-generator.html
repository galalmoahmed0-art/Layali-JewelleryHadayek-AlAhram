<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Joke Generator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
        }

        .joke-box {
            background: #f8f9fa;
            border-left: 5px solid #667eea;
            padding: 25px;
            margin: 30px 0;
            border-radius: 10px;
            min-height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .joke-text {
            font-size: 1.3em;
            color: #333;
            line-height: 1.6;
        }

        .joke-setup {
            margin-bottom: 15px;
            font-weight: 600;
        }

        .joke-delivery {
            margin-top: 15px;
            color: #667eea;
            font-style: italic;
        }

        .loading {
            display: none;
            color: #667eea;
            font-size: 1.1em;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 25px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            font-weight: 600;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .secondary-btn {
            background: #f0f0f0;
            color: #333;
        }

        .secondary-btn:hover {
            background: #e0e0e0;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .joke-type {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .joke-type label {
            display: flex;
            align-items: center;
            gap: 5px;
            cursor: pointer;
            font-size: 0.95em;
        }

        .joke-type input[type="radio"] {
            cursor: pointer;
        }

        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            border-left: 5px solid #c33;
        }

        .joke-counter {
            color: #999;
            font-size: 0.9em;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>😂 Joke Generator</h1>
        
        <div class="joke-type">
            <label>
                <input type="radio" name="jokeType" value="single" checked>
                Single Joke
            </label>
            <label>
                <input type="radio" name="jokeType" value="twopart">
                Two-Part Joke
            </label>
        </div>

        <div class="joke-box">
            <div class="loading">
                <span class="spinner"></span>
                <span>Loading a funny joke...</span>
            </div>
            <div class="joke-text" id="jokeText">
                Click the button below to get started!
            </div>
        </div>

        <div id="error" class="error" style="display: none;"></div>

        <div class="button-group">
            <button onclick="fetchJoke()">Get Random Joke</button>
            <button class="secondary-btn" onclick="copyJoke()">Copy Joke</button>
        </div>

        <div class="joke-counter">
            <span id="jokeCount">0</span> jokes loaded
        </div>
    </div>

    <script>
        let currentJoke = '';
        let jokeCount = 0;

        async function fetchJoke() {
            const jokeType = document.querySelector('input[name="jokeType"]:checked').value;
            const loadingEl = document.querySelector('.loading');
            const jokeTextEl = document.getElementById('jokeText');
            const errorEl = document.getElementById('error');

            loadingEl.style.display = 'flex';
            jokeTextEl.style.display = 'none';
            errorEl.style.display = 'none';

            try {
                // Using JokeAPI (https://jokeapi.dev/)
                const type = jokeType === 'twopart' ? 'twopart' : 'single';
                const response = await fetch(`https://v2.jokeapi.dev/joke/Any?type=${type}`);

                if (!response.ok) {
                    throw new Error('Failed to fetch joke');
                }

                const data = await response.json();

                if (data.error) {
                    throw new Error('Could not generate a joke');
                }

                // Format the joke based on type
                if (data.type === 'single') {
                    currentJoke = data.joke;
                } else if (data.type === 'twopart') {
                    currentJoke = `${data.setup}\n\n${data.delivery}`;
                }

                // Display the joke
                if (data.type === 'twopart') {
                    jokeTextEl.innerHTML = `<div class="joke-setup">${data.setup}</div><div class="joke-delivery">${data.delivery}</div>`;
                } else {
                    jokeTextEl.innerHTML = `<div class="joke-text">${data.joke}</div>`;
                }

                jokeCount++;
                document.getElementById('jokeCount').textContent = jokeCount;

                loadingEl.style.display = 'none';
                jokeTextEl.style.display = 'flex';
            } catch (error) {
                console.error('Error fetching joke:', error);
                errorEl.textContent = `Error: ${error.message}. Please try again.`;
                errorEl.style.display = 'block';
                loadingEl.style.display = 'none';
                jokeTextEl.style.display = 'none';
            }
        }

        function copyJoke() {
            if (currentJoke) {
                navigator.clipboard.writeText(currentJoke).then(() => {
                    alert('Joke copied to clipboard! 📋');
                }).catch(() => {
                    alert('Failed to copy joke');
                });
            } else {
                alert('No joke to copy. Get a joke first!');
            }
        }

        // Load a joke on page load
        window.addEventListener('load', fetchJoke);
    </script>
</body>
</html>
